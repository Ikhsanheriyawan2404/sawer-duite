services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-ikhsanheriyawan2404}/ongob-backend:latest
    container_name: ongob-backend
    restart: unless-stopped
    environment:
      DB_URL: host=postgres user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres} dbname=${POSTGRES_DB:-asintel} port=5432 sslmode=disable
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_DURATION: ${RATE_LIMIT_DURATION:-1m}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      DEFAULT_STATIC_QRIS: ${DEFAULT_STATIC_QRIS}

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-ikhsanheriyawan2404}/ongob-frontend:latest
    container_name: ongob-frontend
    restart: unless-stopped
    depends_on:
      - backend
